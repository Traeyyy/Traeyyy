<!DOCTYPE html>
<html>
<head>
    <title>Survey</title>
</head>
<body>
    <h2>Answer the questions</h2>

    <form action="/submit" method="post">
        <p>1. I feel stressed</p>
        <input type="radio" name="q1" value="1"> Low
        <input type="radio" name="q1" value="3"> Medium
        <input type="radio" name="q1" value="5"> High

        <p>2. I feel lonely</p>
        <input type="radio" name="q2" value="1"> Low
        <input type="radio" name="q2" value="3"> Medium
        <input type="radio" name="q2" value="5"> High

        <p>3. I feel happy</p>
        <input type="radio" name="q3" value="1"> Low
        <input type="radio" name="q3" value="3"> Medium
        <input type="radio" name="q3" value="5"> High

        <p>4. I feel motivated</p>
        <input type="radio" name="q4" value="1"> Low
        <input type="radio" name="q4" value="3"> Medium
        <input type="radio" name="q4" value="5"> High

        <p>5. I feel tired</p>
        <input type="radio" name="q5" value="1"> Low
        <input type="radio" name="q5" value="3"> Medium
        <input type="radio" name="q5" value="5"> High

        <br><br>
        <button type="submit">Submit</button>
    </form>

</body>
</html>
